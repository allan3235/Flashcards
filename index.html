<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - Cómputo Bioinspirado</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Cómputo Bioinspirado</h1>
            <p>Flashcards de estudio para el examen</p>
        </div>
        
        <div class="controls">
            <button class="btn" onclick="previousCard()">← Anterior</button>
            <button class="btn btn-secondary" onclick="toggleFlip()">Voltear</button>
            <button class="btn" onclick="nextCard()">Siguiente →</button>
            <button class="btn btn-secondary" onclick="shuffleCards()">🔀 Mezclar</button>
        </div>
        
        <div class="counter">
            Tarjeta <span id="current">1</span> de <span id="total">50</span>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progress" style="width: 2%"></div>
        </div>
        
        <div class="card-container">
            <div class="card" id="card" onclick="toggleFlip()">
                <div class="card-front" id="front"></div>
                <div class="card-back" id="back"></div>
            </div>
        </div>
        
        <div class="hint">
            💡 Haz clic en la tarjeta para voltearla • Usa los botones para navegar
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
